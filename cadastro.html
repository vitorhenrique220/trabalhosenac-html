<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="cadastro.css">

</head>

<header>
    <h1>Cadastro</h1>
    <img src="zimagem/images-removebg-preview.png" alt="" width="100">
</header>


<body>
    
    <br>

    <nav>
        <a href="abpaginainicial.html">Inicio</a>
        <a href="login.html">Login</a>
        <a href="produtos.html">Cursos</a>
        <a href="contato.html">Contato</a>
    </nav>

    <br>

    <h2 class="titulo-principal">Faça seu cadastro</h2>

    <br>


    <form action="">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome Completo</label>
            <input type="text"><br><br>

            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date"><br><br>

            <label for="email">E-mail</label>
            <input type="email"><br><br>

            <label for="cpf">CPF:</label>
            <input type="text" placeholder="XXX.XXX.XXX-XX">

            <label for="celular">Número de celular:</label><input type="text" placeholder="Ex: (11) 99999-9999">
            <br><br>
            <label for="genero">Gênero:</label>
            <input type="radio" name="genero" value="feminino">Feminino
            <input type="radio" name="genero" value="masculino">Masculino
            <input type="radio" name="genero" value="outro">Outro
            <br><br>
            <label for="turno">Estado Civil:</label><select>
                <option value="S">Solteiro(a)</option>
                <option value="C">Casado(a)</option>
                <option value="D">Divorciado(a)</option>
                <option value="V">Viúvo(a)</option>
                </select>
    </fieldset>

    <br>
  
    <fieldset>
            <legend>Endereço</legend>
            <br>
            <label for="cep">CEP:</label>
            <input type="text" placeholder="Ex: 00000-000"><br><br>

            <label for="rua">Rua:</label>
            <input type="text">

            <label for="numero">Número:</label>
            <input type="text">

            <label for="bairro">Bairro:</label>
            <input type="text">

            <label for="cidade">Cidade:</label>
            <input type="text">

            <label for="estado">Estado:</label>
            <input type="text" placeholder="Ex: SP">
        </fieldset>

        <br>

    <fieldset>
        <legend>Dados de Login</legend>
        
        <label for="email">E-mail: </label><input type="email:">
        <label for="senha">Senha: </label><input type="password" placeholder="Sua senha:">
        <label for="confirmar_senha">Confirmar senha: </label><input type="password" placeholder="Confirme sua senha:">
        <label for="imagem_perfil">Imagem de Perfil: </label> <input type="button" value="Enviar imagem">
    </fieldset>

        <br>

    <fieldset>
      <legend>Termos e Condições</legend>
        <input type="checkbox">Eu aceito os termos e condições.
    </fieldset>
    
    

    <input type="submit" value="Cadastrar">

    <br><br>
