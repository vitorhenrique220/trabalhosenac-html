    <h1 class="titulo-principal">Acesse sua conta para desfrutar de nossos cursos exclusivos.</h1>

    

    <fieldset>
        <legend>Dados de Acesso</legend>

        <label for="email">Email:</label>

        <label for="senha">Senha:</label>

        <input type="checkbox">Lembrar-me<br><br>

    <hr>
   
    <br>


    <h2>Ou use verificação via SMS:</h2><br>
    <label for="celular">Número de celular:</label>
    <input type="text" placeholder="Ex: (11) 99999-9999">
    <input type="button" value="Enviar código"><br><br>

    <label for="codigo">Código de verificação:</label>
