<html lang="pt-br">

    <meta charset="UTF-8">

    <title>Login de Usuário</title>

<body>
     <img src="zimagem/unnamed.jpg" alt="" width="100">
     <h1>Login do Aluno/Professor</h1>
     
     <ul>
        <li><a href="abpaginainicial.html">Página Inicial</a></li>
        <li><a href="produtos.html">Cursos</a></li>
        <li><a href="contato.html">Contato</a></li>
     </ul>

    <h2>Acesse sua conta</h2>

    <fieldset>
        <legend>Dados de Acesso</legend>

        <label for="email">Email:</label>
        <input type="email" placeholder="email@dominio.com"><br><br>

        <label for="senha">Senha:</label>
        <input type="password" placeholder="Sua senha"><br><br>

        <input type="checkbox">Lembrar-me<br><br>

        <input type="submit" value="Entrar"><br><br>

        <a href="senha.html">Esqueceu sua senha?</a><br>
        <a href="cadastro.html">Cadastre-se</a>
    </fieldset>
       
    <hr>

    <h2>Ou entre com:</h2>
    <img src="zimagem/google.png" alt="" width="40"><br>
    <img src="zimagem/facebook.png" alt="" width="40">
    <hr>

    <h2>Ou use verificação via SMS</h2>
    <label for="celular">Número de celular:</label>
    <input type="text" placeholder="Ex: (11) 99999-9999">
    <input type="button" value="Enviar código"><br><br>

    <label for="codigo">Código de verificação:</label>
    <input type="text" placeholder="Digite o código recebido">
    <input type="button" value="Verificar">

    <footer>
        <p><span>© 2026 SENAC. Todos os direitos reservados.</span></p>
    </footer>
